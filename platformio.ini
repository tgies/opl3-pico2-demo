; Nuked-OPL3 audio + bench on RP2350 (Waveshare RP2350-Touch-LCD-3.5).
; Build:   pio run -e pico2-music-366
; Flash:   pio run -e pico2-music-366 -t upload
; Monitor: pio device monitor -b 115200
;
; The envs below are curated presets. For arbitrary clock/voltage/option
; combinations without defining an env per permutation, use
; scripts/flash.sh (wraps PLATFORMIO_BUILD_FLAGS on the base music env).

[platformio]
default_envs = pico2-fast

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
upload_protocol = picotool
monitor_speed = 115200
build_flags =
    -O3
    -DUSBD_MANUFACTURER=\"opl3-stuff\"
    -DUSBD_PRODUCT=\"opl3-bench\"
build_unflags = -Os -O2

[env:pico2-upstream]
lib_ignore = nuked-opl3-fast
build_flags = ${env.build_flags} -DOPL3_VARIANT_NAME=\"upstream\"

[env:pico2-fast]
lib_ignore = nuked-opl3-upstream
build_flags = ${env.build_flags} -DOPL3_VARIANT_NAME=\"fast\" -DOPL3_HOT_IN_RAM=1

; 440 Hz square straight to the codec, OPL3 bypassed (audio-path check).
[env:pico2-tone]
extends = env:pico2-fast
build_flags = ${env:pico2-fast.build_flags} -DAUDIO_TEST_TONE=1

; Embedded VGM playback. Add -DTUNE_FROM_FLASH=1 to read the tune from a
; flash blob at 0x10200000 instead, after loading one with
; scripts/vgm_to_flash.py; this makes code reflashes faster/smaller.
[env:pico2-music]
extends = env:pico2-fast
build_flags = ${env:pico2-fast.build_flags} -DAUDIO_PLAY_TUNE=1

; Single-core clocks. All PLL-synthesizable and multiples of 240 kHz (exact
; I2S MCLK). 294 is the floor for crystal_oscillator; 366 is what PicoGUS
; uses and has comfortable margin.
[env:pico2-music-294]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=294000

[env:pico2-music-300]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=300000

[env:pico2-music-307]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=307200

[env:pico2-music-317]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=316800

[env:pico2-music-366]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=366000

[env:pico2-music-384]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=384000

; Dual-core: channels 0-8 on core 1 (conductor), channels 9-17 plus the
; right-channel mix on core 0 (worker). 180 is the floor for crystal_oscillator
; with thin margin. 186 has comfortable headroom.
[env:pico2-music-180-dual]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=180000 -DOPL3_DUAL_CORE=1

[env:pico2-music-186-dual]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=186000 -DOPL3_DUAL_CORE=1

[env:pico2-music-197-dual]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=196800 -DOPL3_DUAL_CORE=1

[env:pico2-music-216-dual]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=216000 -DOPL3_DUAL_CORE=1

[env:pico2-music-264-dual]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=264000 -DOPL3_DUAL_CORE=1

; Per-slot profiling over serial. Instrumentation overhead is like ~30%, so
; dense sections underrun, but the ratios are still valid.
[env:pico2-music-366-prof]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=366000 -DOPL3_PROFILE

; PM2 OPL2 track at the same clocks (embedded-tune builds only).
[env:pico2-music-307-pm2]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=307200 -DTUNE_PM2

[env:pico2-music-366-pm2]
extends = env:pico2-music
build_flags = ${env:pico2-music.build_flags} -DBENCH_CLOCK_KHZ=366000 -DTUNE_PM2

; Bench only (no audio), upstream vs fast at fixed clocks.
[env:pico2-upstream-200]
extends = env:pico2-upstream
build_flags = ${env:pico2-upstream.build_flags} -DBENCH_CLOCK_KHZ=200000

[env:pico2-upstream-300]
extends = env:pico2-upstream
build_flags = ${env:pico2-upstream.build_flags} -DBENCH_CLOCK_KHZ=300000

[env:pico2-fast-200]
extends = env:pico2-fast
build_flags = ${env:pico2-fast.build_flags} -DBENCH_CLOCK_KHZ=200000

[env:pico2-fast-300]
extends = env:pico2-fast
build_flags = ${env:pico2-fast.build_flags} -DBENCH_CLOCK_KHZ=300000
